product:
  name: Unsecured Mobile Money Credit
  # Retained as product catalog metadata; statement-derived offers are not capped by this value.
  maxLoanKes: 150000
  loanToInflowRatio: 1.5

eligibility:
  minMonthlyNetInflowKes: 50000
  minAccountTenureMonths: 6
  maxActiveLoans: 2
  maxRepaymentToInflowRatio: 0.40
  maxInflowVolatilityCv: 0.75
  minTransactionCount: 8

scoring:
  weights:
    tenure: 20
    inflow: 30
    stability: 20
    activity: 15
    salaryPattern: 10
  roundTrippingPenalty: 25

policy:
  # Copy the synthetic policy PDF into docs/ or set an absolute path.
  pdfPath: docs/FlexVertex_Mobile_Money_Credit_Policy_Guidelines.pdf
  materializeOnStart: true

# Demos require FlexVertex Iron running. Set passwords to match your local Iron Edition
# (policy.local.yml or edit locally — never commit real passwords).
flexvertex:
  enabled: true
  host: localhost
  port: 10000
  adminPath: /System/System/System/Admin
  adminPassword: REPLACE_ME
  domain: TTACS
  nexus: Scorer
  schema: MpesaCredit
  underwriterPassword: REPLACE_ME

server:
  port: 8091
